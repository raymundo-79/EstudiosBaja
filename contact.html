					</ul>

			</div>

		<!-- Cuerpo de la Pagina -->
		<main>
			<section>
				<h2>Contact Us</h2>
				
				<div class="contenedor-tarjetas">
					<div class="tarjeta">
						<h2>Alejandra Ramirez</h2>
						<p>Executive Manager</p>
						<p>aramirez@intele.com.mx</p>
						<p>+52 664-829-8490</p>
					</div>
					<div class="tarjeta">
						<h2>Alex Mendoza</h2>
						<p>Facilities Manager</p>
						<p>amendoza@intele.com.mx</p>
						<p>+52 661-527-8232</p>
					</div>
				</div>
				
				<div style="display: grid; place-items: center;">
					<form id="formulario-contacto">
						<label for="email">E-mail:</label>
						<input type="email" id="email" class="mi-input" placeholder="Write your e-mail" name="email" required>
						<label for="name">Who contact us:</label>
						<input type="text" id="name" class="mi-input" placeholder="Write your name or company name" name="name" required>
						<label for="message">Description of needs:</label>
						<textarea id="message" class="mi-input" placeholder="Write your needs as detailed as posible" name="message" required></textarea>
						<label for="phone">Phone number (optional):</label>
						<input type="tel" id="phone" class="mi-input" placeholder="Please, leave your contact phone number" name="phone">
						<button type="submit" class="boton-enviar">Submit</button>
					</form>
					<div id="respuesta"></div> <!-- Lugar donde mostrar mensajes -->
				</div>
			</section>
		</main>
